<div class="auth-page">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="subtitle">Start managing invoices today</p>

    <form (ngSubmit)="signup()">
      <label>Email</label>
      <input type="email" name="email" [(ngModel)]="email" placeholder="Enter your email" required>

      <label>Password</label>
      <input type="password" name="password" [(ngModel)]="password" placeholder="Create password" required>
      
        <div class="error-box" *ngIf="errors.length > 0">
    <p *ngFor="let error of errors">{{ error }}</p>
  </div>
      <p class="success-message" *ngIf="successMessage">
        {{ successMessage }}
      </p>
      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Creating account...' : 'Signup' }}
      </button>
    </form>

    <p class="switch-link">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
