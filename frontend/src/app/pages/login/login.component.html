<div class="auth-page">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Login to manage your invoices</p>

    <form (ngSubmit)="login()">
      <label>Email</label>
      <input type="email" name="email" [(ngModel)]="email" placeholder="Enter your email" required>

      <label>Password</label>
      <input type="password" name="password" [(ngModel)]="password" placeholder="Enter your password" required>
       <p class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
       </p>
      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <p class="switch-link">
      Don't have an account?
      <a routerLink="/signup">Create account</a>
    </p>
  </div>
</div>
