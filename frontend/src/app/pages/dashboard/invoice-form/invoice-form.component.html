<section class="invoice-form">
  <h2>{{ editingInvoiceId ? 'Edit Invoice' : 'Create Invoice' }}</h2>

  <form (ngSubmit)="save.emit()">
    <div class="form-grid">
      <div>
        <label>Serial</label>
        <input type="text" name="serial" [(ngModel)]="invoice.serial" required>
      </div>

      <div>
        <label>Store</label>
        <select name="storeId" [(ngModel)]="invoice.storeId" required>
          <option [ngValue]="null" disabled hidden>Select Store</option>
          <option *ngFor="let store of stores" [ngValue]="store.id">
            {{ store.name }}
          </option>
        </select>
      </div>

      <div>
        <label>Customer</label>
        <select name="customerId" [(ngModel)]="invoice.customerId" required>
          <option [ngValue]="null" disabled hidden>Select Customer</option>
          <option *ngFor="let customer of customers" [ngValue]="customer.id">
            {{ customer.name }}
          </option>
        </select>
      </div>

      <div>
        <label>Note</label>
        <textarea name="note" [(ngModel)]="invoice.note"></textarea>
      </div>
    </div>

    <div class="items-header">
      <h3>Invoice Items</h3>
      <button type="button" (click)="addItem()">Add Item</button>
    </div>

    <div class="items-table">
      <div class="items-row table-head">
        <span>Product</span>
        <span>Quantity</span>
        <span>Price</span>
        <span>Discount %</span>
        <span>Tax %</span>
        <span>Total</span>
        <span></span>
      </div>

      <div class="items-row" *ngFor="let item of invoice.items; let i = index">
        <select name="productId{{i}}" [(ngModel)]="item.productId" (ngModelChange)="onProductChange(item)" required>
          <option [ngValue]="null" disabled hidden>Select Product</option>
          <option *ngFor="let product of products" [ngValue]="product.id">
            {{ product.name }}
          </option>
        </select>
        <input type="number" name="quantity{{i}}" [(ngModel)]="item.quantity" required>
        <input type="number" name="price{{i}}" [(ngModel)]="item.price" required>
        <input type="number" name="discount{{i}}" [(ngModel)]="item.discountPercent">
        <input type="number" name="tax{{i}}" [(ngModel)]="item.taxPercent">
        <strong>{{ getItemTotal(item) | number:'1.2-2' }}</strong>
        <button type="button" class="danger-btn" (click)="removeItem(i)">X</button>
      </div>
    </div>

    <div class="form-actions">
      <strong>Total: {{ getInvoiceTotal() | number:'1.2-2' }}</strong>

      <div>
        <button type="button" class="secondary-btn" (click)="clear.emit()" [disabled]="isSaving">Clear</button>
        <button type="submit" [disabled]="isSaving">
          {{ isSaving ? 'Saving...' : (editingInvoiceId ? 'Update' : 'Submit') }}
        </button>
      </div>
    </div>
  </form>
</section>
